<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Car Collection</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: #0b0b0f;
            color: #fff;
        }

        h1 {
            text-align: center;
            padding: 20px;
            color: #ff1e1e;
            letter-spacing: 3px;
            text-shadow: 0 0 10px #ff1e1e;
        }

        .gallery {
            width: 90%;
            margin: auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding-bottom: 40px;
        }

        .card {
            background: #141418;
            border: 1px solid #ff1e1e33;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            transition: 0.3s ease;

            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 0 20px #ff1e1e55;
            border-color: #ff1e1e;
        }

        /* ✅ FIXED IMAGE FIT */
        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            object-position: center;
            display: block;
            border-bottom: 2px solid #ff1e1e;
        }

        .card p {
            text-align: center;
            margin: 12px 0 0 0;
            font-weight: bold;
            color: #ffffff;
        }

        .tag {
            display: block;
            text-align: center;
            font-size: 12px;
            color: #ff1e1e;
            padding-bottom: 15px;
            letter-spacing: 1px;
        }

        .badge {
            display: inline-block;
            background: #ff1e1e;
            color: black;
            padding: 3px 8px;
            font-size: 10px;
            border-radius: 20px;
            margin-left: 5px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .gallery {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 500px) {
            .gallery {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <h1>🏁 CAR COLLECTION</h1>

    <div class="gallery">

        <div class="card">
            <img src="background.jfif">
            <p>CAR MODEL 01</p>
            <span class="tag">CLASSIC EDITION <span class="badge">HOT</span></span>
        </div>

        <div class="card">
            <img src="2.jfif">
            <p>CAR MODEL 02</p>
            <span class="tag">SPORT SERIES <span class="badge">NEW</span></span>
        </div>

        <div class="card">
            <img src="3.jfif">
            <p>CAR MODEL 03</p>
            <span class="tag">LUXURY TYPE</span>
        </div>

        <div class="card">
            <img src="4.jfif">
            <p>CAR MODEL 04</p>
            <span class="tag">RACING BEAST <span class="badge">TOP</span></span>
        </div>

        <div class="card">
            <img src="5.jfif">
            <p>CAR MODEL 05</p>
            <span class="tag">MODERN DESIGN</span>
        </div>

        <div class="card">
            <img src="6.jfif">
            <p>CAR MODEL 06</p>
            <span class="tag">FUTURE CONCEPT</span>
        </div>

    </div>

</body>
</html>
